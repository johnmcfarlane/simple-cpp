---
# tests of the checks required by CI, i.e. test tests
name: ci-test

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'LICENCE'
      - 'README.md'
  workflow_dispatch:

jobs:
  tests:
    name: CI test
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: clang-debug
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "TRUE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

          - profile: clang-release
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "FALSE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "FALSE"
            trigger_warning: "FALSE"

          - profile: clang-test
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "TRUE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

          - profile: clang-test-fuzzer
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "TRUE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

          - profile: clang-test-tsan
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "FALSE"
            trigger_tsan: "TRUE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

          - profile: clang-tidy
            trigger_clang_tidy: "TRUE"
            trigger_stdlib: "TRUE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

          - profile: gcc-debug
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "TRUE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

          - profile: gcc-release
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "FALSE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "FALSE"
            trigger_warning: "FALSE"

          - profile: gcc-test
            trigger_clang_tidy: "FALSE"
            trigger_stdlib: "TRUE"
            trigger_tsan: "FALSE"
            trigger_ubsan: "TRUE"
            trigger_warning: "TRUE"

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and run control tests
        uses: devcontainers/ci@v0.3
        env:
          PROJECT_SUBDIRECTORY: ".github/workflows/ci-test"
        with:
          configFile: .devcontainer/${{ matrix.profile }}/devcontainer.json
          imageName: ghcr.io/johnmcfarlane/simple-cpp/ci-test-${{ matrix.profile }}
          imageTag: 3
          env: |
            TRIGGER_CLANG_TIDY=${{ matrix.trigger_clang_tidy }}
            TRIGGER_STDLIB=${{ matrix.trigger_stdlib }}
            TRIGGER_TSAN=${{ matrix.trigger_tsan }}
            TRIGGER_UBSAN=${{ matrix.trigger_ubsan }}
            TRIGGER_WARNING=${{ matrix.trigger_warning }}
          runCmd: |
            cmake --build $BUILD_DIR --verbose
            ctest --output-on-failure --parallel --test-dir $BUILD_DIR --verbose
