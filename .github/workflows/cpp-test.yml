---
name: 'C++ test'

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  unit-tests:
    name: test
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: clang-debug
          - name: clang-release
          - name: clang-test
          - name: clang-test-fuzzer
          - name: clang-test-tsan
          - name: clang-tidy
          - name: gcc-debug
          - name: gcc-release
          - name: gcc-test

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and run tests
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/${{ matrix.name }}/devcontainer.json
          imageName: ghcr.io/johnmcfarlane/simple-cpp/${{ matrix.name }}
          imageTag: 2
          runCmd: |
            cmake --build $BUILD_DIR --verbose
            ctest --output-on-failure --test-dir $BUILD_DIR

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4 
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linter
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/lint/devcontainer.json
          imageName: ghcr.io/johnmcfarlane/simple-cpp/lint
          runCmd: .devcontainer/lint/lint
